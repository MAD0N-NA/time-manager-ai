name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # позволяет запустить вручную из вкладки Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate platform folders
        run: flutter create . --project-name time_manager_ai --org com.timemanager --platforms=android --overwrite=false || true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation (Drift/Riverpod/Freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk artifacts/time-manager-ai-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: time-manager-ai-apk
          path: artifacts/time-manager-ai-release.apk
          retention-days: 30

      - name: Upload to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/time-manager-ai-release.apk
          generate_release_notes: true
