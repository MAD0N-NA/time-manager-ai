name: time_manager_ai
description: Тайм-менеджер с интеграцией Claude AI — календарь, задачи, Pomodoro, аналитика.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # Navigation
  go_router: ^14.2.0

  # Notifications & background
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  workmanager: ^0.5.2

  # HTTP / API
  http: ^1.2.1
  dio: ^5.4.3+1

  # Voice
  speech_to_text: ^7.3.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # UI
  intl: ^0.19.0
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Utility
  uuid: ^4.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  logger: ^2.3.0
  collection: ^1.18.0
  rxdart: ^0.28.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  build_runner: ^2.4.13
  drift_dev: ^2.22.0
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
